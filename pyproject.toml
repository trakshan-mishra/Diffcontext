[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "diffcontext"
version = "0.2.0"
description = "Static-analysis-powered blast radius detection and context compiler for LLMs"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "Trakshan Mishra"}]
keywords = [
    "llm", "context", "static-analysis", "dependency-graph",
    "code-intelligence", "blast-radius", "call-graph",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]

[project.urls]
Homepage = "https://github.com/trakshan-mishra/diffcontext"
Repository = "https://github.com/trakshan-mishra/diffcontext"
Issues = "https://github.com/trakshan-mishra/diffcontext/issues"

[project.optional-dependencies]
bench = ["rank_bm25>=0.2.2"]
dev = ["pytest>=7.0", "rank_bm25>=0.2.2"]

[project.scripts]
diffcontext = "diffcontext.cli:main"

[tool.setuptools.packages.find]
include = ["diffcontext*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
